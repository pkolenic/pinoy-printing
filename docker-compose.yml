services:
  redis:
    image: "redis:alpine"
    command: [ "redis-server", "--requirepass", "${DOCKER_REDIS_PASSWORD}" ]
    ports:
      - "6380:6379"
    networks:
      - backend_net

  app:
    image: "node:22"
    user: "node"
    working_dir: /home/node/app
    ports:
      - "3001:3001"
      - "9229:9229"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TENANT_REDIS_URI=redis://:${DOCKER_REDIS_PASSWORD}@redis:6379/1
      - REDIS_URI=redis://:${DOCKER_REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./:/home/node/app
    expose:
      - "3001"
    # Command to run your root package.json start script - use if debugging is not needed
    # command: [ "npm", "start", "--prefix", "backend" ]
    # Using the node command with the inspect flag allows us to connect to the node process for debugging
    command: [ "node", "--inspect=0.0.0.0:9229", "backend/dist/server.js" ]
    depends_on:
      - redis
    networks:
      - backend_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --loglevel debug --proxy-connect-timeout 30s --proxy-tcp-keepalive 30s run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on: [ app ]
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge
